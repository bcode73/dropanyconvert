[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect root to default language
[[redirects]]
  from   = "/"
  to     = "/en"
  status = 301
  force  = false

# Custom 404 page
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404

# Security headers applied to all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options       = "nosniff"
    X-Frame-Options              = "DENY"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=()"
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://partner.googleadservices.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; worker-src 'self' blob:; child-src blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"

# Long-lived cache for versioned assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for sitemaps
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "application/xml; charset=utf-8"
